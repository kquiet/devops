# Default values for project-base.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

namespace: testcicdproj

# should be specified when deploy
namePrefix: namePrefix-not-specified-

image:
  repository: miscld.oa.internal
  frontend:
    # should be specified when deploy
    name: frontend-image-name-not-specified
    # should be specified when deploy
    tag: frontend-image-tag-not-specified
  backend:
    # should be specified when deploy
    name: backend-image-name-not-specified
    # should be specified when deploy
    tag: backend-image-tag-not-specified
  otelCollector:
    name: opentelemetry-collector-contrib
    tag: 0.89.0
  pullPolicy: IfNotPresent
  pullSecrets:
  - name: harbor-registry-key

deployment:
  frontend:
    enabled: false
    nameSuffix: poc-frontend
    replicaCount: 1
    # should be specified when deploy
    resources: {}
      # limits:
      #   cpu: 100m
      #   memory: 200Mi
      # requests:
      #   cpu: 50m
      #   memory: 100Mi
    port: 80
    protocol: TCP
    env: []
    terminationGracePeriodSeconds: 30
    progressDeadlineSeconds: 600
    restartPolicy: Always
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 1
  backend:
    enabled: false
    nameSuffix: poc-backend
    replicaCount: 1
    # should be specified when deploy
    resources: {}
      # limits:
      #   cpu: 1900m
      #   memory: 20280Mi
      # requests:
      #   cpu: 50m
      #   memory: 100Mi
    port: 8080
    protocol: TCP
    env: []
    terminationGracePeriodSeconds: 30
    progressDeadlineSeconds: 600
    restartPolicy: Always
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 1
    otelCollector:
      resources:
        limits:
          cpu: 100m
          memory: 128Mi
        requests:
          cpu: 50m
          memory: 64Mi
      env: []
  labels:
    location: tn
    # should be specified when deploy
    user: user-not-specified

dnsPolicy: ClusterFirst

service:
  frontend:
    enabled: false
    nameSuffix: poc-frontend
    type: NodePort
    port: 80
    nodePort:
    protocol: TCP
    sessionAffinity: None
    externalTrafficPolicy: Cluster
  backend:
    enabled: false
    nameSuffix: poc-backend
    type: NodePort
    port: 8080
    nodePort:
    protocol: TCP
    sessionAffinity: None
    externalTrafficPolicy: Cluster
  externalMysql:
    enabled: true
    nameSuffix: external-mysql
    host: host-not-specified
    port: 3306
  externalLog:
    enabled: true
    nameSuffix: external-log
    host: host-not-specified
    port: 3100
  externalTrace:
    enabled: true
    nameSuffix: external-trace
    host: host-not-specified
    port: 4317

cronjob:
  emulation:
    enabled: true
    resources:
      limits:
        cpu: 100m
        memory: 32Mi
      requests:
        cpu: 50m
        memory: 8Mi

prometheus:
  enabled: true
  # https://github.com/prometheus-community/helm-charts/blob/main/charts/prometheus/values.yaml

  alertmanager:
    enabled: false

  # https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-state-metrics/values.yaml
  kube-state-metrics:
    enabled: true
    image:
      registry: miscld.oa.internal
      repository: testcicdproj/kube-state-metrics
      tag: v2.3.0
    imagePullSecrets:
    - name: harbor-registry-key
    rbac:
      create: false
    serviceAccount:
      create: false
      name: "cicd"
    collectors:
      - configmaps
      - cronjobs
      - daemonsets
      - deployments
      - ingresses
      - jobs
      - persistentvolumeclaims
      - pods
      - replicasets
      - services
      - endpoints
      - statefulsets
    releaseNamespace: true
    resources:
      limits:
        cpu: "30m"
        memory: "64Mi"
      requests:
        cpu: "10m"
        memory: "30Mi"

  prometheus-node-exporter:
    enabled: false

  # https://github.com/prometheus-community/helm-charts/blob/main/charts/prometheus-pushgateway/values.yaml
  prometheus-pushgateway:
    enabled: false
    serviceAccount:
      create: false
      name: "cicd"
    image:
      repository: miscld.oa.internal/testcicdproj/prometheus-pushgateway
      tag: "v1.6.2"
    resources:
      limits:
        cpu: "30m"
        memory: "64Mi"
      requests:
        cpu: "10m"
        memory: "30Mi"
    service:
      type: "NodePort"

  serviceAccounts:
    server:
      create: false
      name: "cicd"
  rbac:
    create: false

  podSecurityPolicy:
    enabled: false

  imagePullSecrets:
  - name: harbor-registry-key

  server:
    image:
      repository: miscld.oa.internal/testcicdproj/prometheus
      tag: v2.47.2
    persistentVolume:
      enabled: false
    resources:
      limits:
        cpu: "100m"
        memory: "512Mi"
      requests:
        cpu: "10m"
        memory: "100Mi"
    service:
      type: "NodePort"
      servicePort: 9090
    retention: "1d"
    extraArgs:
      enable-feature: "exemplar-storage"
    extraFlags:
      - web.enable-remote-write-receiver
    global:
      scrape_interval: 15s
      scrape_timeout: 10s
      evaluation_interval: 15s
      external_labels:
        "external_prometheus_source_by": "testcicdproj"

  configmapReload:
    prometheus:
      enabled: false
      image:
        repository: miscld.oa.internal/testcicdproj/prometheus-config-reloader
        tag: v0.68.0
      resources:
        limits:
          cpu: "30m"
          memory: "64Mi"
        requests:
          cpu: "10m"
          memory: "30Mi"

  serverFiles:
    prometheus.yml:
      rule_files:
        - /etc/config/recording_rules.yml
        - /etc/config/alerting_rules.yml
      ## Below two files are DEPRECATED will be removed from this default values file
        - /etc/config/rules
        - /etc/config/alerts

      scrape_configs:
        - job_name: prometheus
          static_configs:
            - targets:
              - localhost:9090

        # A scrape configuration for running Prometheus on a Kubernetes cluster.
        # This uses separate scrape configs for cluster components (i.e. API server, node)
        # and services to allow each to use different authentication configs.
        #
        # Kubernetes labels will be added as Prometheus labels on metrics via the
        # `labelmap` relabeling action.


          # Metric relabel configs to apply to samples before ingestion.
          # [Metric Relabeling](https://prometheus.io/docs/prometheus/latest/configuration/configuration/#metric_relabel_configs)
          # metric_relabel_configs:
          # - action: labeldrop
          #   regex: (kubernetes_io_hostname|failure_domain_beta_kubernetes_io_region|beta_kubernetes_io_os|beta_kubernetes_io_arch|beta_kubernetes_io_instance_type|failure_domain_beta_kubernetes_io_zone)

        # Scrape config for service endpoints.
        #
        # The relabeling allows the actual service scrape endpoint to be configured
        # via the following annotations:
        #
        # * `prometheus.io/scrape`: Only scrape services that have a value of
        # `true`, except if `prometheus.io/scrape-slow` is set to `true` as well.
        # * `prometheus.io/scheme`: If the metrics endpoint is secured then you will need
        # to set this to `https` & most likely set the `tls_config` of the scrape config.
        # * `prometheus.io/path`: If the metrics path is not `/metrics` override this.
        # * `prometheus.io/port`: If the metrics are exposed on a different port to the
        # service then set this appropriately.
        # * `prometheus.io/param_<parameter>`: If the metrics endpoint uses parameters
        # then you can set any parameter

        - job_name: 'prometheus-kube-state-metrics'
          honor_labels: true
          kubernetes_sd_configs:
            - role: service
              namespaces:
                names:
                  - "testcicdproj"
          relabel_configs:
            - source_labels: [__meta_kubernetes_service_label_app_kubernetes_io_name]
              action: keep
              regex: kube-state-metrics

        # Example scrape config for probing services via the Blackbox Exporter.
        #
        # The relabeling allows the actual service scrape endpoint to be configured
        # via the following annotations:
        #
        # * `prometheus.io/probe`: Only probe services that have a value of `true`
        - job_name: 'kubernetes-services'
          honor_labels: true
          metrics_path: /probe
          params:
            module: [http_2xx]
          kubernetes_sd_configs:
            - role: service
              namespaces:
                names:
                  - "testcicdproj"
          relabel_configs:
            - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_probe]
              action: keep
              regex: true
            - source_labels: [__address__]
              target_label: __param_target
            - target_label: __address__
              replacement: blackbox
            - source_labels: [__param_target]
              target_label: instance
            - action: labelmap
              regex: __meta_kubernetes_service_label_(.+)
            - source_labels: [__meta_kubernetes_namespace]
              target_label: namespace
            - source_labels: [__meta_kubernetes_service_name]
              target_label: service

        # Example scrape config for pods
        #
        # The relabeling allows the actual pod scrape endpoint to be configured via the
        # following annotations:
        #
        # * `prometheus.io/scrape`: Only scrape pods that have a value of `true`,
        # except if `prometheus.io/scrape-slow` is set to `true` as well.
        # * `prometheus.io/scheme`: If the metrics endpoint is secured then you will need
        # to set this to `https` & most likely set the `tls_config` of the scrape config.
        # * `prometheus.io/path`: If the metrics path is not `/metrics` override this.
        # * `prometheus.io/port`: Scrape the pod on the indicated port instead of the default of `9102`.
        - job_name: 'kubernetes-pods'
          honor_labels: true
          kubernetes_sd_configs:
            - role: pod
              namespaces:
                names:
                  - "testcicdproj"
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
              action: keep
              regex: true
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scheme]
              action: replace
              regex: (https?)
              target_label: __scheme__
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
              action: replace
              target_label: __metrics_path__
              regex: (.+)
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port, __meta_kubernetes_pod_ip]
              action: replace
              regex: (\d+);(([A-Fa-f0-9]{1,4}::?){1,7}[A-Fa-f0-9]{1,4})
              replacement: '[$2]:$1'
              target_label: __address__
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port, __meta_kubernetes_pod_ip]
              action: replace
              regex: (\d+);((([0-9]+?)(\.|$)){4})
              replacement: $2:$1
              target_label: __address__
            - action: labelmap
              regex: __meta_kubernetes_pod_annotation_prometheus_io_param_(.+)
              replacement: __param_$1
            - action: labelmap
              regex: __meta_kubernetes_pod_label_(.+)
            - source_labels: [__meta_kubernetes_namespace]
              action: replace
              target_label: namespace
            - source_labels: [__meta_kubernetes_pod_name]
              action: replace
              target_label: pod
            - source_labels: [__meta_kubernetes_pod_phase]
              regex: Pending|Succeeded|Failed|Completed
              action: drop
            - source_labels: [__meta_kubernetes_pod_node_name]
              action: replace
              target_label: node
        - job_name: 'kubernetes-pods-sidecar'
          honor_labels: true
          kubernetes_sd_configs:
            - role: pod
              namespaces:
                names:
                  - "testcicdproj"
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
              action: keep
              regex: true
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scheme]
              action: replace
              regex: (https?)
              target_label: __scheme__
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path_sidecar]
              action: replace
              target_label: __metrics_path__
              regex: (.+)
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port_sidecar, __meta_kubernetes_pod_ip]
              action: replace
              regex: (\d+);(([A-Fa-f0-9]{1,4}::?){1,7}[A-Fa-f0-9]{1,4})
              replacement: '[$2]:$1'
              target_label: __address__
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port_sidecar, __meta_kubernetes_pod_ip]
              action: replace
              regex: (\d+);((([0-9]+?)(\.|$)){4})
              replacement: $2:$1
              target_label: __address__
            - action: labelmap
              regex: __meta_kubernetes_pod_annotation_prometheus_io_param_(.+)
              replacement: __param_$1
            - action: labelmap
              regex: __meta_kubernetes_pod_label_(.+)
            - source_labels: [__meta_kubernetes_namespace]
              action: replace
              target_label: namespace
            - source_labels: [__meta_kubernetes_pod_name]
              action: replace
              target_label: pod
            - source_labels: [__meta_kubernetes_pod_phase]
              regex: Pending|Succeeded|Failed|Completed
              action: drop
            - source_labels: [__meta_kubernetes_pod_node_name]
              action: replace
              target_label: node
