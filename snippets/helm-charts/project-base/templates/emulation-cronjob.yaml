{{- if .Values.cronjob.emulation.enabled -}}
apiVersion: batch/v1
kind: CronJob
metadata:
  namespace: {{ .Values.namespace }}
  name: {{ .Values.namePrefix }}-emulation
  labels:
    component: emulation
spec:
  schedule: '* * * * *'
  startingDeadlineSeconds: 55
  concurrencyPolicy: Replace
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: 'invoke-backend'
            image: 'miscld.oa.internal/testcicdproj/curl:8.4.0'
            command:
            - "sh"
            - "-c"
            - |
              for i in $(seq 1 10); do curl -sSL -o /dev/null -X GET http://{{ .Values.namePrefix }}-{{ .Values.service.backend.nameSuffix }}:{{ .Values.deployment.backend.port }}/beats/1/ ; done
              for i in $(seq 1 10); do curl -sSL -o /dev/null -X GET http://{{ .Values.namePrefix }}-{{ .Values.service.backend.nameSuffix }}:{{ .Values.deployment.backend.port }}/beats/777/ ; done
              for i in $(seq 1 10); do curl -sSL -o /dev/null -X GET http://{{ .Values.namePrefix }}-{{ .Values.service.backend.nameSuffix }}:{{ .Values.deployment.backend.port }}/ping ; done
            resources:
              {{- toYaml .Values.cronjob.emulation.resources | nindent 14}}
          {{- with .Values.image.pullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          restartPolicy: Never
{{- end }}