---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: autoscale-demo
  namespace: devops
spec:
  scaleTargetRef:
    name: autoscale-demo
  pollingInterval: 5
  cooldownPeriod: 30
  minReplicaCount: 1
  maxReplicaCount: 10
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          policies:
          - type: Pods
            value: 2
            periodSeconds: 60
          - type: Percent
            value: 20
            periodSeconds: 60
          selectPolicy: Max
          stabilizationWindowSeconds: 0
        scaleDown:
          policies:
          - type: Pods
            value: 2
            periodSeconds: 60
          - type: Percent
            value: 20
            periodSeconds: 60
          selectPolicy: Min
          stabilizationWindowSeconds: 300
  triggers:
  - type: cpu
    metricType: Utilization
    metadata:
      value: "60"
  - type: memory
    metricType: Utilization
    metadata:
      value: "70"
  - type: prometheus
    metadata:
      serverAddress: http://prometheus-server.monitoring.svc.cluster.local:80
      metricName: gpu_utilization
      query: sum(gpu_utilization)
      threshold: '20'
  - type: prometheus
    metadata:
      serverAddress: http://prometheus-server.monitoring.svc.cluster.local:80
      metricName: active_connections
      query: sum(active_connections)
      threshold: '40'