apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoscale-demo
  namespace: devops
  labels:
    app: autoscale-demo
spec:
  selector:
    matchLabels:
      app: autoscale-demo
  template:
    metadata:
      labels:
        app: autoscale-demo
    spec:
      containers:
      - name: autoscale-demo
        image: docker-group.repo.svc.internal/autoscale-demo:latest
        resources:
          requests:
            memory: "128Mi"
            cpu: "10m"
          limits:
            memory: "256Mi"
            cpu: "1000m"
        ports:
        - name: http
          containerPort: 63101
---
apiVersion: v1
kind: Service
metadata:
  name: autoscale-demo
  namespace: devops
spec:
  selector:
    app: autoscale-demo
  ports:
  - name: http
    protocol: TCP
    port: 63101
    targetPort: 63101
