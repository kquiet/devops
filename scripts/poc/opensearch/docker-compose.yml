# when using docker compose command against this docker-compose file,
# please make sure .env exists with following environment variables:
# PATH_OF_OPENSEARCH_01_DATA
services:
  opensearch-01:
    image: opensearchproject/opensearch:2.18.0
    environment:
      discovery.type: "single-node"
      node.name: "opensearch-01"
      cluster.name: "doc-cluster"
      DISABLE_SECURITY_PLUGIN: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - $PATH_OF_OPENSEARCH_01_DATA:/usr/share/opensearch/data
    ports:
      - 9200:9200
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail http://localhost:9200 || exit 1"]
      interval: 10s
      retries: 10
    networks:
      - devops-lan
    restart: always
  opensearch-01-init:
    image: curlimages/curl:8.11.1
    depends_on:
      opensearch-01:
        condition: service_healthy
    command: |
      sh -c "
      echo 'Checking if OpenSearch is ready...';

      # Wait for OpenSearch to be available
      until curl -s http://opensearch-01:9200; do
        echo 'Waiting for OpenSearch...';
        sleep 5;
      done;

      # Check if the index template already exists
      if curl -s -o /dev/null -w '%{http_code}' http://opensearch-01:9200/_index_template/doc-index-template | grep -q 200; then
        echo 'Index template doc-index-template already exists. Skipping creation.';
        exit 0;
      fi;

      echo 'Initializing OpenSearch setup...';

      # Create index template
      echo 'Creating index template doc-index-template...';
      if curl -s -o /dev/null -w '%{http_code}' -X POST http://opensearch-01:9200/_index_template/doc-index-template -H 'Content-Type: application/json' -d '{
          \"index_patterns\": [\"doc-index-*\"],
          \"template\": {\"settings\": {\"number_of_shards\": 1, \"number_of_replicas\": 0}}
        }' | grep -q 200; then
        echo 'Index template doc-index-template created successfully!';
      else
        echo 'Failed to create index template doc-index-template.';
      fi;

      echo 'Initialization finish.';
      "
    networks:
      - devops-lan
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.18.0
    ports:
      - 5601:5601
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch-01:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    networks:
      - devops-lan
    restart: always
networks:
  devops-lan:
    external: true