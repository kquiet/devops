# when using docker compose command against this docker-compose file,
# please make sure .env exists with following environment variables:
# PATH_OF_OPENSEARCH_01_DATA
services:
  opensearch-01:
    image: opensearchproject/opensearch:2.18.0
    environment:
      DISABLE_INSTALL_DEMO_CONFIG: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - $PATH_OF_OPENSEARCH_01_DATA:/usr/share/opensearch/data
      # *.pem certificates/keys below are for demo purpose, please generate new ones when using in production
      - ./opensearch01-config/node01-key.pem:/usr/share/opensearch/config/esnode-key.pem:ro
      - ./opensearch01-config/node01.pem:/usr/share/opensearch/config/esnode.pem:ro
      - ./opensearch01-config/root-ca.pem:/usr/share/opensearch/config/root-ca.pem:ro
      - ./opensearch01-config/jvm.options:/usr/share/opensearch/config/jvm.options:ro
      - ./opensearch01-config/log4j2.properties:/usr/share/opensearch/config/log4j2.properties:ro
      - ./opensearch01-config/opensearch.yml:/usr/share/opensearch/config/opensearch.yml:ro
    ports:
      - 9200:9200
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail -u admin:admin http://localhost:9200 || exit 1"]
      interval: 10s
      retries: 10
    networks:
      - devops-lan
    restart: always
  opensearch-01-init:
    image: curlimages/curl:8.11.1
    depends_on:
      opensearch-01:
        condition: service_healthy
    command: |
      sh -c "
      echo 'Checking if OpenSearch is ready...';

      # Wait for OpenSearch to be available
      until curl -s -u admin:admin http://opensearch-01:9200; do
        echo 'Waiting for OpenSearch...';
        sleep 5;
      done;

      # Check if the index template already exists
      if curl -s -o /dev/null -w '%{http_code}' -u admin:admin http://opensearch-01:9200/_index_template/doc-index-template | grep -q 200; then
        echo 'Index template doc-index-template already exists. Skipping creation.';
        exit 0;
      fi;

      echo 'Initializing OpenSearch setup...';

      # Create index template
      echo 'Creating index template doc-index-template...';
      if curl -s -o /dev/null -w '%{http_code}' -X POST -u admin:admin http://opensearch-01:9200/_index_template/doc-index-template -H 'Content-Type: application/json' -d '{
          \"index_patterns\": [\"doc-index-*\"],
          \"template\": {\"settings\": {\"number_of_shards\": 1, \"number_of_replicas\": 0}}
        }' | grep -q 200; then
        echo 'Index template doc-index-template created successfully!';
      else
        echo 'Failed to create index template doc-index-template.';
      fi;

      echo 'Initialization finish.';
      "
    networks:
      - devops-lan
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.18.0
    ports:
      - 5601:5601
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch-01:9200"]'
      # username/password below are for demo purpose, please generate new ones when using in production
      OPENSEARCH_USERNAME: "admin"
      OPENSEARCH_PASSWORD: "admin"
    volumes:
      - ./dashboards-config:/usr/share/opensearch-dashboards/config
    networks:
      - devops-lan
    restart: always
networks:
  devops-lan:
    external: true