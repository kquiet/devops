# when using docker compose command against this docker-compose file,
# please make sure .env exists with following environment variables:
# PATH_OF_OPENSEARCH_01_DATA
services:
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.18.0
    ports:
      - 5601:5601
    environment:
      OPENSEARCH_HOSTS: '["http://host.docker.internal:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - devops-lan
    restart: always
networks:
  devops-lan:
    external: true
