services:
  mariadb:
    image: docker-group.repo.svc.internal/mariadb:11.8.5
    container_name: mariadb
    ports:
      - "13306:3306"
    volumes:
      - /opt/docker_volumes/mariadb:/var/lib/mysql:Z
    environment:
      MARIADB_ROOT_PASSWORD: "${MARIADB_ROOT_PASSWORD}"
    restart: always
    networks:
      devops-lan:
networks:
  devops-lan:
    external: true
