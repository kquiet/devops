# when using docker compose command against this docker-compose file,
# please make sure .env exists with following environment variables:
# WORDPRESS_DB_USER
# WORDPRESS_DB_PASSWORD
services:
  wordpress:
    image: docker-group.repo.svc.internal/wordpress:6.6.2-fpm-ext
    container_name: wordpress
    environment:
      WORDPRESS_DB_HOST: mariadb
      WORDPRESS_DB_USER: "${WORDPRESS_DB_USER}"
      WORDPRESS_DB_PASSWORD: "${WORDPRESS_DB_PASSWORD}"
      WORDPRESS_DB_NAME: wordpress_zoo
      WORDPRESS_DB_CHARSET: "utf8mb4"
      WORDPRESS_DB_COLLATE: "utf8mb4_unicode_520_ci"
      WORDPRESS_CONFIG_EXTRA: |
        define('AUTOMATIC_UPDATER_DISABLED', true);
        define('WP_HTTP_BLOCK_EXTERNAL', true);
      #HTTP_PROXY: http://host.docker.internal:3128
      #HTTPS_PROXY: http://host.docker.internal:3128
      #NO_PROXY: localhost,127.0.0.1,ldap.oa.internal
    volumes:
      - ./php.ini:/usr/local/etc/php/conf.d/php.ini:ro
      - /opt/docker_volumes/wordpress:/var/www/html
    restart: always
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      devops-lan:
  nginx-wordpress:
    image: docker-group.repo.svc.internal/nginx:1.27.2
    container_name: nginx-wordpress
    ports:
      - "8061:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/docker_volumes/wordpress:/var/www/html:ro
    restart: always
    depends_on:
      - wordpress
    networks:
      devops-lan:
networks:
  devops-lan:
    external: true
