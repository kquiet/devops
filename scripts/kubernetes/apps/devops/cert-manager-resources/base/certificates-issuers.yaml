apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: zoo-dev-platform-intermediate-ca-issuer
spec:
  ca:
    secretName: zoo-dev-platform-root-ca-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: zoo-dev-platform-intermediate-ca
spec:
  isCA: true
  commonName: ZOO Developer Platform Intermediate CA
  secretName: zoo-dev-platform-intermediate-ca-tls
  duration: 8760h # 365 days
  renewBefore: 720h # 30 days
  privateKey:
    algorithm: RSA
    size: 4096
    rotationPolicy: Always
  issuerRef:
    name: zoo-dev-platform-intermediate-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: zoo-dev-platform-wildcard-svc-issuer
spec:
  ca:
    secretName: zoo-dev-platform-intermediate-ca-tls
