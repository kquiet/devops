apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: cert-manager

# ~1 is how JSON Pointer escapes /, so the annotation key iam.gke.io/gcp-service-account must be written as iam.gke.io~1gcp-service-account
patches:
- target:
    kind: VaultStaticSecret
    name: root-ca-tls
  patch: |
    - op: add
      path: /spec/path
      value: devops/ca/root
- target:
    kind: Application
    name: cert-manager
  patch: |
    - op: replace
      path: /spec/project
      value: devops
    - op: replace
      path: /spec/destination/server
      value: https://192.168.201.83:6443