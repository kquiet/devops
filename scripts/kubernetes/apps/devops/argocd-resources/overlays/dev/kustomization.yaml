apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: argocd

# ~1 is how JSON Pointer escapes /, so the annotation key iam.gke.io/gcp-service-account must be written as iam.gke.io~1gcp-service-account
patches:
- target:
    kind: HTTPRoute
    name: argocd-server
  patch: |
    - op: add
      path: /spec/hostnames/0
      value: argocd.svc.internal
    - op: add
      path: /spec/parentRefs/0/name
      value: multi-protocol-gateway
    - op: add
      path: /spec/parentRefs/0/namespace
      value: devops
    - op: add
      path: /spec/parentRefs/0/sectionName
      value: https-zoo-svc-wildcard
- target:
    kind: VaultStaticSecret
    name: argocd-notifications
  patch: |
    - op: add
      path: /spec/path
      value: devops/argocd/notification