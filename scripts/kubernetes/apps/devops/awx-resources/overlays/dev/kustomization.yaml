apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: awx

# ~1 is how JSON Pointer escapes /, so the annotation key iam.gke.io/gcp-service-account must be written as iam.gke.io~1gcp-service-account
patches:
- target:
    kind: Application
    name: awx-operator
  patch: |
    - op: replace
      path: /spec/project
      value: devops
    - op: replace
      path: /spec/destination/server
      value: https://192.168.201.83:6443
    - op: replace
      path: /spec/destination/namespace
      value: awx
    - op: add
      path: /metadata/annotations/argocd.argoproj.io~1sync-wave
      value: 1
- target:
    kind: VaultStaticSecret
    name: awx-admin
  patch: |
    - op: add
      path: /spec/path
      value: devops/awx/admin
- target:
    kind: VaultStaticSecret
    name: awx-postgresql
  patch: |
    - op: add
      path: /spec/path
      value: devops/awx/postgresql
- target:
    kind: VaultStaticSecret
    name: awx-secret-key
  patch: |
    - op: add
      path: /spec/path
      value: devops/awx/secret-key
- target:
    kind: VaultStaticSecret
    name: root-ca-cert
  patch: |
    - op: add
      path: /spec/path
      value: devops/ca/root
- target:
    kind: HTTPRoute
    name: awx
  patch: |
    - op: add
      path: /spec/hostnames/0
      value: awx.svc.internal
    - op: add
      path: /spec/parentRefs/0/name
      value: multi-protocol-gateway
    - op: add
      path: /spec/parentRefs/0/namespace
      value: devops
    - op: add
      path: /spec/parentRefs/0/sectionName
      value: https-zoo-svc-wildcard