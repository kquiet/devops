apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: gitlab-runner

# ~1 is how JSON Pointer escapes /, so the annotation key iam.gke.io/gcp-service-account must be written as iam.gke.io~1gcp-service-account
patches:
- target:
    kind: VaultStaticSecret
    name: gitlab-runner-all-01-token
  patch: |
    - op: add
      path: /spec/path
      value: devops/gitlab-runner/all-01
- target:
    kind: Application
    name: gitlab-runner-all-01
  patch: |
    - op: replace
      path: /spec/project
      value: devops
    - op: replace
      path: /spec/destination/server
      value: https://192.168.201.83:6443
    - op: replace
      path: /spec/destination/namespace
      value: gitlab-runner