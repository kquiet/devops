apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: vault

# ~1 is how JSON Pointer escapes /, so the annotation key iam.gke.io/gcp-service-account must be written as iam.gke.io~1gcp-service-account
patches:
- target:
    kind: Application
    name: vault
  patch: |
    - op: replace
      path: /spec/project
      value: devops
    - op: replace
      path: /spec/destination/server
      value: https://192.168.201.83:6443
    - op: add
      path: /metadata/annotations/argocd.argoproj.io~1sync-wave
      value: -1
- target:
    kind: Application
    name: vault-secrets-operator
  patch: |
    - op: replace
      path: /spec/project
      value: devops
    - op: replace
      path: /spec/destination/server
      value: https://192.168.201.83:6443
- target:
    kind: HTTPRoute
    name: vault
  patch: |
    - op: add
      path: /spec/hostnames/0
      value: vault.svc.internal
    - op: add
      path: /spec/parentRefs/0/name
      value: multi-protocol-gateway
    - op: add
      path: /spec/parentRefs/0/namespace
      value: devops
    - op: add
      path: /spec/parentRefs/0/sectionName
      value: https-zoo-svc-wildcard