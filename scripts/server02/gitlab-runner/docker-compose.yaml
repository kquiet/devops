services:
  gitlab-runner-zoo-02:
    image: docker-group.repo.svc.internal/gitlab/gitlab-runner:alpine3.21-v18.7.0
    container_name: gitlab-runner-zoo-02
    restart: always
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./gitlab-runner-zoo-02:/etc/gitlab-runner
    networks:
      - devops-lan
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 4gb
        reservations:
          cpus: '0.01'
          memory: 100mb
  gitlab-runner-all-02:
    image: docker-group.repo.svc.internal/gitlab/gitlab-runner:alpine3.21-v18.7.0
    container_name: gitlab-runner-all-02
    restart: always
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./gitlab-runner-all-02:/etc/gitlab-runner
    networks:
      - devops-lan
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 4gb
        reservations:
          cpus: '0.01'
          memory: 100mb
networks:
  devops-lan:
    external: true
