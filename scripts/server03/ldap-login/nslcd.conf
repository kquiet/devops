# /etc/nslcd.conf
# nslcd configuration file. See nslcd.conf(5)
# for details.

# The user and group nslcd should run as.
uid nslcd
gid nslcd

log syslog debug

# The location at which the LDAP server(s) should be reachable.
uri ldap://ldap.oa.internal:389

# The search base that will be used for all queries.
base dc=oa,dc=internal

# The LDAP protocol version to use.
#ldap_version 3

# The DN to bind with for normal lookups.
#binddn cn=annonymous,dc=example,dc=net
#bindpw secret
binddn ${bind_dn}
bindpw ${bind_pw}

#Specifies the time limit (in seconds) to wait for a response from the LDAP server. A value of zero (0), which is the default, is to wait indefinitely for searches to be completed.
timelimit 30

#Specifies the period if inactivity (in seconds) after which the connection to the LDAP server will be closed. The default is not to time out connections.
idle_timelimit 300

#Specifies whether automatic referral chasing should be enabled. The default behaviour is to chase referrals.
referrals no

# The DN used for password modifications by root.
#rootpwmoddn cn=admin,dc=example,dc=com

# SSL options
#ssl off
#tls_reqcert never
#tls_cacertfile /etc/ssl/certs/ca-certificates.crt

# The search scope.
#scope sub

# Mappings for Active Directory
pagesize 1000
#filter passwd (&(objectClass=user)(!(objectClass=computer)))
filter passwd (&(objectClass=user)(|(memberOf=CN=ZOO164800,OU=40,OU=DeptGroup,DC=oa,DC=internal)(memberOf=CN=ZOO164802,OU=50,OU=DeptGroup,DC=oa,DC=internal)(memberOf=CN=ZOO164803,OU=50,OU=DeptGroup,DC=oa,DC=internal)))
map    passwd uid              sAMAccountName
map    passwd uidNumber        employeeID
map    passwd gidNumber        "999"
map    passwd homeDirectory    "/home/$sAMAccountName"
map    passwd loginShell       "/bin/bash"