services:
  test-gitlab-runner-all-01:
    image: docker-group.repo.svc.internal/gitlab/gitlab-runner:alpine3.21-v18.3.1
    container_name: test-gitlab-runner-all-01
    restart: always
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./test-gitlab-runner-all-01:/etc/gitlab-runner
    networks:
      - devops-lan
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 4gb
        reservations:
          cpus: '0.01'
          memory: 100mb
networks:
  devops-lan:
    external: true
